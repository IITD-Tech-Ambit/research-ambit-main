syntax = "proto3";

package search.v1;

// East-west contract for the Node/Fastify search-api (Docker service
// "search-api", gRPC listener on :50053, routed by Envoy on the /search.v1.
// prefix). It freezes the entire current /search/* surface, whose Fastify
// routes live under /api/v1 (public path = /search/api/v1/<route>).
//
// Two services share the one search-api gRPC listener (same package, same
// Envoy cluster + prefix):
//   SearchService   -> search / author-scope / suggest / faculty-for-query /
//                      documents / author collaborators / ip/*
//   TaxonomyService -> /api/v1/taxonomy/*
//
// Response-shape philosophy matches directory.v1: requests fully typed;
// deterministic payloads (suggest, taxonomy, faculty-for-query, collaborators)
// typed; document-bearing payloads returned as documented `*_json` strings
// because `results[]` are raw hydrated Mongo documents and facet `value`s are
// polymorphic (numeric years vs string ranges), which proto3 cannot round-trip
// faithfully. The gateway parses `*_json` and splices it verbatim so
// tech-ambit-explorer sees identical bodies. All /search endpoints are public
// (no auth) and read-only.

service SearchService {
  // POST /api/v1/search
  rpc Search(SearchRequest) returns (SearchBodyResponse);
  // POST /api/v1/search/author-scope
  rpc SearchAuthorScope(AuthorScopeRequest) returns (SearchBodyResponse);
  // GET /api/v1/suggest
  rpc Suggest(SuggestRequest) returns (SuggestResponse);
  // GET /api/v1/search/faculty-for-query
  rpc FacultyForQuery(FacultyForQueryRequest) returns (FacultyForQueryResponse);
  // GET /api/v1/document/:id
  rpc GetDocument(GetDocumentRequest) returns (DocumentResponse);
  // GET /api/v1/documents/by-author/:authorId
  rpc GetDocumentsByAuthor(DocumentsByAuthorRequest) returns (DocumentsByAuthorResponse);
  // GET /api/v1/document/:id/similar
  rpc GetSimilarDocuments(SimilarDocumentsRequest) returns (SimilarDocumentsResponse);
  // GET /api/v1/author/:id/collaborators
  rpc GetAuthorCollaborators(CollaboratorsRequest) returns (CollaboratorsResponse);

  // GET /api/v1/ip/suggest
  rpc IpSuggest(SuggestRequest) returns (IpSuggestResponse);
  // POST /api/v1/ip/search
  rpc IpSearch(IpSearchRequest) returns (SearchBodyResponse);
  // GET /api/v1/ip/document/:id
  rpc GetIpDocument(GetDocumentRequest) returns (DocumentResponse);
}

// Search filter block, shared by Search / AuthorScope. Every field is optional
// (proto3 presence) so unset filters are omitted, matching the REST behaviour
// where absent filters simply don't constrain the query.
message SearchFilters {
  optional int32 year_from = 1;
  optional int32 year_to = 2;
  optional string field_associated = 3;
  optional string document_type = 4;
  repeated string document_types = 5;
  repeated string subject_area = 6;
  optional string author_id = 7;
  optional bool first_author_only = 8;
  optional bool interdisciplinary = 9;
  optional string kerberos = 10;
}

message SearchRequest {
  string query = 1;                 // required, 1..500
  SearchFilters filters = 2;
  string sort = 3;                  // relevance|date|citations|impact|normalized (default relevance)
  int32 page = 4;                   // default 1, 1..10000
  int32 per_page = 5;               // default 20, 1..100
  repeated string search_in = 6;    // title|abstract|author|subject_area|field
  string mode = 7;                  // basic|advanced (default advanced)
  optional string refine_within = 8; // <=500
  repeated string refine_chain = 9;  // <=8 entries, each <=500
  optional bool rerank = 10;
}

message AuthorScopeRequest {
  string query = 1;                 // required
  string author_id = 2;             // required
  int32 page = 3;                   // default 1
  int32 per_page = 4;               // default 20
  string mode = 5;                  // default advanced
  optional string refine_within = 6;
  repeated string refine_chain = 7;
  repeated string search_in = 8;
  SearchFilters filters = 9;
}

// Full response body of POST /search and /search/author-scope, returned
// verbatim. Opaque because: results[] are raw hydrated Mongo docs with
// conditional scoring fields (rerank_score/fused_score/similarity_score),
// facets[].value is polymorphic, and advanced-mode status keys
// (fuzzy_fallback/mode/message) are conditionally present. The gateway returns
// this JSON directly (the meta.{took_ms,cache_hit} block is already inside it).
message SearchBodyResponse { string body_json = 1; }

message SuggestRequest {
  string q = 1;          // required, <=200
  int32 limit = 2;       // default 8, 1..15
}
message SuggestAuthor {
  string id = 1;
  string scopus_id = 2;
  string name = 3;
  string department = 4;
  string image_url = 5;
  double score = 6;
}
message SuggestPaper {
  string id = 1;
  string title = 2;
  int32 year = 3;
  string lead_author = 4;
  double score = 5;
}
message SuggestGroups {
  repeated SuggestAuthor authors = 1;
  repeated SuggestPaper papers = 2;
}
message SuggestResponse {
  string intent = 1;        // author|paper|mixed
  double confidence = 2;
  SuggestGroups groups = 3;
  Meta meta = 4;
}

message IpSuggestInventor {
  string id = 1;
  string name = 2;
  bool is_faculty = 3;
  string kerberos = 4;
  double score = 5;
}
message IpSuggestDocument {
  string id = 1;
  string title = 2;
  int32 year = 3;
  string type_of_ip = 4;
  string lead_inventor = 5;
  double score = 6;
}
message IpSuggestGroups {
  repeated IpSuggestInventor inventors = 1;
  repeated IpSuggestDocument documents = 2;
}
message IpSuggestResponse {
  string intent = 1;        // inventor|document|mixed
  double confidence = 2;
  IpSuggestGroups groups = 3;
  Meta meta = 4;
}

message IpSearchFilters {
  optional int32 year_from = 1;
  optional int32 year_to = 2;
  optional string type_of_ip = 3;
  repeated string type_of_ip_list = 4;
  optional string field_of_invention = 5;
  repeated string classification = 6;
  optional string department = 7;
  optional string country = 8;
  optional string kerberos = 9;
  optional bool primary_inventor_only = 10;
}

message IpSearchRequest {
  string query = 1;                 // required, 1..500
  IpSearchFilters filters = 2;
  string sort = 3;                  // relevance|date|normalized (default relevance)
  int32 page = 4;                   // default 1, 1..10000
  int32 per_page = 5;               // default 20, 1..100
  repeated string search_in = 6;    // title|abstract|inventor|field_of_invention|classification
  string mode = 7;                  // basic|advanced (default advanced)
  optional string refine_within = 8; // <=500
  repeated string refine_chain = 9;  // <=8 entries, each <=500
  optional bool rerank = 10;
}

// --- FacultyForQuery (unchanged wire contract; field numbers preserved) -----
message FacultyForQueryRequest {
  string query = 1;
  // "basic" | "advanced"; empty string means the service default ("advanced").
  string mode = 2;
  repeated string search_in = 3;
}
message Faculty {
  string name = 1;
  string author_id = 2;
  int32 paper_count = 3;
  double relevance_score = 4;
}
message Department {
  string name = 1;
  repeated Faculty faculty = 2;
  int32 total_paper_count = 3;
}
message FacultyForQueryResponse {
  repeated Department departments = 1;
  int32 total_faculty = 2;
  int32 total_matching_papers = 3;
  double took_ms = 4;
  bool cache_hit = 5;
}

message GetDocumentRequest { string id = 1; } // 24-hex _id or open_search_id
// { document: <full Mongo doc, author-roster filtered> } — raw doc => opaque.
message DocumentResponse {
  bool found = 1;            // false => gateway returns 404
  string document_json = 2;
}

message DocumentsByAuthorRequest {
  string author_id = 1;   // path :authorId
  int32 page = 2;         // default 1
  int32 per_page = 3;     // default 20, 1..100
}
message DocumentsByAuthorResponse {
  // documents[] are full Mongo docs (select -__v) => opaque JSON array string.
  string documents_json = 1;
  SearchPagination pagination = 2;
}

message SimilarDocumentsRequest {
  string id = 1;
  int32 limit = 2;   // default 10, 1..50
}
message SimilarDocumentsResponse {
  bool found = 1;
  string source_id = 2;
  string source_title = 3;
  repeated string source_subject_areas = 4;
  // similar[] = hydrated Mongo docs + similarity_score => opaque JSON array.
  string similar_json = 5;
}

message CollaboratorsRequest { string author_id = 1; } // path :id
message Collaborator {
  string author_id = 1;
  int32 collaboration_count = 2;
  string name = 3;
}
message CollaboratorsResponse {
  string author_id = 1;
  int32 total_papers = 2;
  repeated Collaborator collaborators = 3;
}

message SearchPagination {
  int32 page = 1;
  int32 per_page = 2;
  int32 total = 3;
  int32 total_pages = 4;
}

// --------------------------------------------------------------------------
// TaxonomyService  (/api/v1/taxonomy/*) — all reads, fully deterministic.
// --------------------------------------------------------------------------
service TaxonomyService {
  // GET /api/v1/taxonomy/departments
  rpc GetDepartments(EmptyRequest) returns (DepartmentsResponse);
  // GET /api/v1/taxonomy/themes
  rpc GetThemes(ThemesRequest) returns (ThemesResponse);
  // GET /api/v1/taxonomy/domains
  rpc GetDomains(DomainsRequest) returns (DomainsResponse);
  // GET /api/v1/taxonomy/domains/:domainSlug/subdomains
  rpc GetSubdomains(SubdomainsRequest) returns (SubdomainsResponse);
  // GET /api/v1/taxonomy/counts
  rpc GetCounts(CountsRequest) returns (CountsResponse);
  // GET /api/v1/taxonomy/faculty
  rpc GetFaculty(TaxonomyFacultyRequest) returns (TaxonomyFacultyResponse);
  // GET /api/v1/taxonomy/faculty/:kerberos/papers
  rpc GetFacultyPapers(TaxonomyFacultyPapersRequest) returns (TaxonomyFacultyPapersResponse);
}

message EmptyRequest {}
message Meta {
  double took_ms = 1;
  bool cache_hit = 2;
}

message TaxDepartment {
  string id = 1;
  string name = 2;
  string code = 3;
}
message DepartmentsResponse {
  repeated TaxDepartment departments = 1;
  Meta meta = 2;
}

message ThemesRequest { optional string department = 1; } // 1..32
message Theme {
  string id = 1;
  string name = 2;
  string slug = 3;
  int32 paper_count = 4;
  int32 faculty_count = 5;
}
message ThemesResponse {
  repeated Theme themes = 1;
  Meta meta = 2;
}

message DomainsRequest {
  optional string theme = 1;
  optional string department = 2;
}
message Domain {
  string id = 1;
  string name = 2;
  string slug = 3;
  int32 paper_count = 4;
  int32 faculty_count = 5;
  int32 subdomain_count = 6;
}
message DomainsResponse {
  repeated Domain domains = 1;
  Meta meta = 2;
}

message SubdomainsRequest {
  string domain_slug = 1;   // path :domainSlug
  optional string theme = 2;
  optional string department = 3;
}
message DomainRef {
  string id = 1;
  string name = 2;
  string slug = 3;
}
message Subdomain {
  string id = 1;
  string name = 2;
  string slug = 3;
  int32 paper_count = 4;
  int32 faculty_count = 5;
}
message SubdomainsResponse {
  DomainRef domain = 1;
  repeated Subdomain subdomains = 2;
  Meta meta = 3;
}

message CountsRequest {
  optional string theme = 1;
  optional string domain = 2;
  optional string subdomain = 3;
  optional string department = 4;
}
message CountsResponse {
  int32 paper_count = 1;
  int32 faculty_count = 2;
  Meta meta = 3;
}

message TaxonomyFacultyRequest {
  optional string theme = 1;
  optional string domain = 2;
  optional string subdomain = 3;
  optional string department = 4;
  int32 page = 5;       // default 1
  int32 per_page = 6;   // default 20, max 100
}
message TaxonomyPagination {
  int32 page = 1;
  int32 per_page = 2;
  int32 total = 3;
  int32 total_pages = 4;
}
message TaxonomyFacultyResponse {
  repeated string kerberos_list = 1;
  int32 faculty_total = 2;
  TaxonomyPagination pagination = 3;
  Meta meta = 4;
}

message TaxonomyFacultyPapersRequest {
  string kerberos = 1;      // path :kerberos
  optional string theme = 2;
  optional string domain = 3;
  optional string subdomain = 4;
  int32 page = 5;           // default 1
  int32 per_page = 6;       // default 20, max 100
}
message TaxonomyPaper {
  string id = 1;
  string title = 2;
  string abstract = 3;
  optional string link = 4;
  optional int32 publication_year = 5;
  optional string document_type = 6;
  int32 citation_count = 7;
  repeated string topics = 8;
}
message TaxonomyFacultyPapersResponse {
  repeated TaxonomyPaper results = 1;
  TaxonomyPagination pagination = 2;
  Meta meta = 3;
}
