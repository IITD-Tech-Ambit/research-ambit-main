syntax = "proto3";

package chat.v1;

// Internal helpers for the chatbot-agent. The public answer stream stays SSE
// at the api-gateway; this RPC exposes quota state to other services.
service ChatService {
  // Reads (does not consume) the per-user daily message quota.
  rpc CheckQuota(CheckQuotaRequest) returns (CheckQuotaResponse);
}

message CheckQuotaRequest {
  string user_id = 1;
}

message CheckQuotaResponse {
  int32 limit = 1;
  int32 used = 2;
  int32 remaining = 3;
}
