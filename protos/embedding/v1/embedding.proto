syntax = "proto3";

package embedding.v1;

// East-west contract for the BGE embedding + cross-encoder reranker service.
// Served by opensearch/services/embedding; consumed by search-api and
// chatbot-agent through Envoy.
service EmbeddingService {
  rpc Embed(EmbedRequest) returns (EmbedResponse);
  rpc Rerank(RerankRequest) returns (RerankResponse);
}

message EmbedRequest {
  repeated string texts = 1;
}

message Embedding {
  repeated float values = 1;
}

message EmbedResponse {
  repeated Embedding embeddings = 1;
  double took_ms = 2;
  int32 dimension = 3;
}

message RerankRequest {
  string query = 1;
  repeated string documents = 2;
  // 0 means "no truncation" (proto3 has no optional-int semantics we need).
  int32 top_n = 3;
}

message RerankResult {
  // Index into RerankRequest.documents.
  int32 index = 1;
  double score = 2;
}

message RerankResponse {
  // Sorted by score descending (truncated to top_n when top_n > 0).
  repeated RerankResult results = 1;
  double took_ms = 2;
}
