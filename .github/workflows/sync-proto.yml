name: Sync proto to proto-registry

# This service owns directory.v1 - protos/directory/v1/directory.proto here
# is the source of truth. Whenever it changes on main, mirror it into
# github.com/IITD-Tech-Ambit/proto-registry so other services picking up a
# fresh copy of the registry see the current contract. Deliberately minimal:
# no linting, no versioning, just copy the file and push if it changed.
on:
  push:
    branches: [main]
    paths:
      - protos/directory/v1/directory.proto

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout proto-registry
        uses: actions/checkout@v4
        with:
          repository: IITD-Tech-Ambit/proto-registry
          token: ${{ secrets.PROTO_REGISTRY_TOKEN }}
          path: proto-registry

      - name: Copy directory.proto into proto-registry
        run: |
          mkdir -p proto-registry/proto/directory/v1
          cp source/protos/directory/v1/directory.proto \
             proto-registry/proto/directory/v1/directory.proto

      - name: Commit and push if changed
        id: commit
        working-directory: proto-registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to proto/directory/v1/directory.proto - skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add proto/directory/v1/directory.proto
          git commit -m "Sync directory.v1 from research-ambit-main@${{ github.sha }}"

          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push rejected (attempt $i/5) — another sync likely raced us. Rebasing and retrying..."
            sleep $((RANDOM % 5 + 1))
            git fetch origin main
            git rebase origin/main
          done
          echo "Failed to push after 5 attempts."
          exit 1

      # Notify consumers listed for directory.v1 in proto-registry's
      # consumers.yml, so their own pull-proto.yml can fetch the update
      # instead of silently drifting (see consumers.yml for the full map).
      # Each consumer is retried independently and a failure on one doesn't
      # skip the rest — a bare loop with -e would abort on the first failed
      # curl and silently leave later consumers un-notified (see the incident
      # that motivated this: chatbot-agent's search.v1 stubs went stale for
      # days after a dispatch failure in the sibling sync-search-proto.yml
      # went unnoticed).
      - name: Notify consumers
        if: steps.commit.outputs.changed == 'true'
        run: |
          FAILED=""
          for repo in api-gateway; do
            success=false
            for attempt in 1 2 3; do
              if curl -sf -X POST \
                -H "Authorization: Bearer ${{ secrets.PROTO_REGISTRY_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/IITD-Tech-Ambit/${repo}/dispatches" \
                -d '{"event_type":"proto-updated","client_payload":{"package":"directory.v1"}}'; then
                success=true
                break
              fi
              echo "Dispatch to ${repo} failed (attempt ${attempt}/3), retrying..."
              sleep $((RANDOM % 5 + 1))
            done
            if [ "$success" = false ]; then
              echo "::error::Failed to notify ${repo} after 3 attempts — it will not auto-regenerate stubs for this proto update and needs a manual sync."
              FAILED="${FAILED} ${repo}"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "::error::Consumers not notified:${FAILED}"
            exit 1
          fi
